name: Ask DongFeng CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install minimal package deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Validate Ask DongFeng builtin skill
        run: python scripts/ask-dongfeng/smoke_builtin_skill.py
      - name: Validate bundled Ask DongFeng skill package
        run: python skills/software-development/ask-dongfeng/scripts/validate_skill.py skills/software-development/ask-dongfeng/SKILL.md
      - name: Validate shell syntax
        run: |
          bash -n skills/software-development/ask-dongfeng/scripts/*.sh

